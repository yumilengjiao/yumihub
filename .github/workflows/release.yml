name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          node-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: bun install

      - name: Debug signing key
        run: |
          $keyLen = if ($env:TAURI_SIGNING_PRIVATE_KEY) { $env:TAURI_SIGNING_PRIVATE_KEY.Length } else { 0 }
          $passLen = if ($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) { $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD.Length } else { 0 }
          echo "TAURI_SIGNING_PRIVATE_KEY length: $keyLen"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD length: $passLen"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false

      - name: Patch latest.json with Cloudflare Worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $tag = "v$version"

          # 下载 latest.json
          gh release download $tag --pattern "latest.json" --clobber

          # 替换 url
          $json = Get-Content latest.json -Raw | ConvertFrom-Json
          foreach ($platform in $json.platforms.PSObject.Properties) {
            $json.platforms.$($platform.Name).url = $json.platforms.$($platform.Name).url -replace "https://github.com", "https://yumihub-updator.1554517392.workers.dev"
          }
          $json | ConvertTo-Json -Depth 10 | Set-Content latest.json

          # 覆盖上传
          gh release upload $tag latest.json --clobber
